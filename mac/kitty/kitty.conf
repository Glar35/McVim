# ──────────────────────────────────────────────
#  Kitty — McVim companion config (macOS)
# ──────────────────────────────────────────────
# Drop this at ~/.config/kitty/kitty.conf (or `include` it) so Kitty's
# appearance matches McVim's Neovim colorscheme and the Cmd/Option key
# behaviour that McVim's keybindings rely on. See mac/README.md.

# ---- Font ----
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        14.5
adjust_line_height  110%
disable_ligatures   never

# ---- Transparency & blur (macOS frosted glass) ----
background_opacity      0.80
background_blur         40
dynamic_background_opacity yes

# ---- Window aesthetics ----
window_padding_width    16
window_margin_width     0
hide_window_decorations titlebar-only
macos_show_window_title_in all
remember_window_size    yes
confirm_os_window_close 0
macos_quit_when_last_window_closed yes
macos_titlebar_color    background
macos_thicken_font      0.25
macos_option_as_alt     yes

# ---- Cursor ----
cursor_shape            beam
cursor_beam_thickness   1.6
cursor_blink_interval   0.5
cursor_trail            3
cursor_trail_decay      0.1 0.4

# ---- Scrollback ----
scrollback_lines        10000
enable_audio_bell       no

# ---- Tabs ----
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# ---- Color scheme: Catppuccin Mocha (background matches McVim's nvim base) ----
foreground              #CDD6F4
background              #241B36
selection_foreground    #1E1E2E
selection_background    #F5E0DC

cursor                  #F5E0DC
cursor_text_color       #1E1E2E

url_color               #F5E0DC

active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825

# normal
color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE

# bright
color8  #585B70
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6ADC8

# ---- Misc ----
shell_integration       enabled
allow_remote_control    yes
listen_on               unix:/tmp/mykitty

# ---- Default working directory / startup session ----
# Optional. session.conf in this folder just opens one window; edit the `cd`
# line in it to taste, or remove this line to start in your home directory.
startup_session         session.conf

# ---- Fullscreen behavior ----
macos_traditional_fullscreen yes

# ──────────────────────────────────────────────
#  Keybindings — required for McVim
# ──────────────────────────────────────────────

# McVim leader: Option+\ must arrive as a literal backslash
map alt+backslash send_text all \\

map cmd+shift+f toggle_fullscreen
map cmd+shift+m toggle_maximized

# Tab navigation with arrows
map cmd+shift+right next_tab
map cmd+shift+left  previous_tab

# Reload kitty config
map cmd+r load_config_file

# Cmd+Left/Right → Home/End escapes (work in shell + nvim, all modes)
map cmd+left  send_text all \x1b[H
map cmd+right send_text all \x1b[F
# Cmd+Backspace → Ctrl-U (delete to start of line)
map cmd+backspace send_text all \x15
# Option+Backspace → Ctrl-W (delete previous word)
map alt+backspace send_text all \x17

# New split inherits current directory
map cmd+enter       launch --cwd=current

# New tab also inherits current directory
map cmd+t           new_tab_with_cwd

# Option+letter arrives in nvim as <M-letter>; nvim translates per-mode.
# (No alt+letter overrides here — let macos_option_as_alt yes handle them.)

# Option+; and Option+Shift+; → command mode in nvim
map alt+semicolon      send_text all \x1b;
map alt+shift+semicolon send_text all \x1b:

# Cmd+C: copy terminal selection (if any) AND forward to nvim only when kitty keyboard protocol is active (nvim), not in shell
map cmd+c combine : copy_to_clipboard : send_text kitty \x1b[99;9u
# Cmd+V: default Kitty paste (works in terminal + nvim via bracketed paste)
map cmd+v paste_from_clipboard

# Close current split (window) / tab
map cmd+w           close_window
map cmd+shift+w     close_tab
